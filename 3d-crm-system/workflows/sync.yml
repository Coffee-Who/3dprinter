name: Auto CRM Sync

on:
  push:
    paths:
      - "obsidian/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run converter
        run: python scripts/md_to_json.py

      - name: Commit changes
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@github.com"
          git add data/customers.json
          git commit -m "auto sync CRM data" || echo "no changes"
          git push
