<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>每日焦點 · 實威國際</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#000;--bg1:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#21262d;--border2:#30363d;
  --t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --accent:#2563EB;--accent2:#1d4ed8;--abg:#0d1433;
  --yellow:#d29922;--red:#f85149;--green:#238636;
  --sh:0 2px 12px rgba(0,0,0,.4);
}
body.lm{
  --bg0:#f4f5f8;--bg1:#fff;--bg2:#f6f8fa;--bg3:#e1e4e8;
  --border:#d0d7de;--border2:#b1bac4;
  --t1:#1f2328;--t2:#656d76;--t3:#8c959f;
  --accent:#2563EB;--accent2:#1d4ed8;--abg:#EFF4FF;
  --sh:0 2px 12px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{font-family:'DM Sans','Noto Sans TC',-apple-system,sans-serif;color:var(--t1);font-size:14px;background:var(--bg0);min-height:100vh;transition:background .2s,color .2s}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* SHELL */
#shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{background:var(--bg1);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:20}
.logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;color:var(--t1)}
.logo-box{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-sep{width:1px;height:14px;background:var(--border2)}
.logo-sub{font-size:11px;color:var(--t2)}
.tr{display:flex;align-items:center;gap:8px}
.theme-btn{background:var(--bg2);border:1px solid var(--border);padding:5px 12px;border-radius:20px;cursor:pointer;font-size:13px;color:var(--t2);display:flex;align-items:center;gap:5px;transition:.15s;font-family:inherit}
.theme-btn:hover{color:var(--t1);border-color:var(--border2)}
.vbadge{font-size:10px;color:var(--t3);background:var(--bg2);border:1px solid var(--border);padding:3px 8px;border-radius:4px}
#tabbar{background:var(--bg1);border-bottom:1px solid var(--border);display:flex;padding:0 16px;flex-shrink:0;z-index:10;overflow-x:auto}
.tab{padding:12px 16px;font-size:13px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:color .15s;user-select:none;font-weight:500}
.tab:hover{color:var(--t1)}
.tab.on{color:var(--t1);border-bottom-color:var(--accent)}
.soon-badge{font-size:9px;background:var(--bg3);color:var(--t2);padding:1px 5px;border-radius:3px}
#pages{flex:1;overflow:hidden;position:relative}
.pg{display:none;position:absolute;inset:0;overflow-y:auto}
.pg.on{display:block}

/* DAILY FOCUS */
.daily-outer{padding:36px 24px 60px;max-width:1120px;margin:0 auto}

/* Hero header */
.daily-hero{text-align:center;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.d-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.d-eyebrow::before,.d-eyebrow::after{content:'';width:24px;height:1px;background:var(--accent);opacity:.5}
.daily-hero h1{font-size:clamp(22px,4vw,36px);font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:6px}
.daily-hero h1 em{font-style:normal;color:var(--accent)}
.daily-hero p{font-size:13px;color:var(--t2);margin-bottom:18px}
.daily-meta{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.refresh-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.refresh-btn.loading{opacity:.5;pointer-events:none}
.meta-txt{font-size:11px;color:var(--t3)}

/* Filter pills */
.act-filter{display:flex;gap:7px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.af-btn{padding:6px 20px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.af-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.af-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* Count badge */
.result-count{text-align:center;font-size:12px;color:var(--t3);margin-bottom:16px}
.result-count strong{color:var(--t2)}

/* Activity grid — responsive, truly centered */
.act-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  justify-content:center;
}
@media(max-width:900px){.act-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.act-grid{grid-template-columns:1fr}}

/* Activity card — aistockmap daily style */
.act-card{
  background:var(--bg1);
  border:1px solid var(--border2);
  border-radius:14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  cursor:pointer;
  text-decoration:none;
  color:inherit;
  transition:border-color .2s,transform .25s,box-shadow .25s;
}
.act-card:hover{
  border-color:var(--accent);
  transform:translateY(-6px);
  box-shadow:0 16px 40px rgba(37,99,235,.2);
}
.act-img-wrap{
  width:100%;height:175px;
  overflow:hidden;background:var(--bg2);
  position:relative;flex-shrink:0;
}
.act-img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.act-card:hover .act-img{transform:scale(1.06)}
.act-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  background:linear-gradient(135deg,var(--abg) 0%,var(--bg2) 100%);
}
.act-tag-wrap{position:absolute;top:10px;left:10px;display:flex;gap:5px;flex-wrap:wrap}
.act-tag{
  padding:3px 11px;border-radius:20px;
  font-size:10px;font-weight:800;
  color:#fff;letter-spacing:.4px;
  background:var(--accent);
}
.act-tag.expo{background:#7c3aed}
.act-tag.survey{background:var(--green)}

/* Number badge top-right */
.act-num{
  position:absolute;top:10px;right:10px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:rgba(255,255,255,.8);
}

.act-body{padding:16px 16px 10px;flex:1;display:flex;flex-direction:column;gap:8px}
.act-title{font-size:14px;font-weight:700;line-height:1.5;color:var(--t1)}
.act-date{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.act-date span{color:var(--t2)}

.act-footer{padding:0 16px 16px}
.act-cta{
  display:flex;align-items:center;justify-content:center;gap:5px;
  width:100%;padding:9px;border-radius:8px;
  background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.25);
  color:var(--accent);font-size:12px;font-weight:700;
  transition:.15s;font-family:inherit;cursor:pointer;
}
.act-cta:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.act-card:hover .act-cta{background:var(--accent);color:#fff;border-color:var(--accent)}

/* skeleton */
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:14px;border:1px solid var(--border)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:300px}
.empty-block{text-align:center;padding:60px 20px;color:var(--t3);grid-column:1/-1}
.e-icon{font-size:48px;margin-bottom:12px}
.e-txt{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:4px}
.e-sub{font-size:13px}
</style>
</head>
<body>

<div id="shell">
  <div id="topbar">
    <div class="logo">
      <div class="logo-box">🖨</div>
      實威國際
      <div class="logo-sep"></div>
      <span class="logo-sub">3D Print Studio</span>
    </div>
    <div class="tr">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 暗色</button>
      <span class="vbadge">v1.0</span>
    </div>
  </div>
  <div id="tabbar">
    <div class="tab" onclick="location.href='tab-home.html'">🏠 首頁</div>
    <div class="tab" onclick="location.href='tab-3dprint.html'">🖨️ 3D列印前準備</div>
    <div class="tab" onclick="location.href='tab-sample.html'">📦 3D列印</div>
    <div class="tab on">📰 每日焦點</div>
    <div class="tab" style="pointer-events:none;opacity:.4">📋 歷史記錄 <span class="soon-badge">Soon</span></div>
    <div class="tab" style="pointer-events:none;opacity:.4">🧪 材料管理 <span class="soon-badge">Soon</span></div>
  </div>
  <div id="pages">
    <div class="pg on">
      <div class="daily-outer">
        <!-- Hero -->
        <div class="daily-hero">
          <div class="d-eyebrow">實威國際</div>
          <h1>活動 <em>焦點</em></h1>
          <p>最新研討會、展覽與活動消息 — 每日 08:00 自動更新，最多顯示 10 筆</p>
          <div class="daily-meta">
            <span class="meta-txt" id="lastUpdateTxt"></span>
            <button class="refresh-btn" id="refreshBtn" onclick="fetchActs(true)">
              <span id="refreshIcon">🔄</span> 立即更新
            </button>
            <span class="meta-txt" id="nextRefreshTxt"></span>
          </div>
        </div>

        <!-- Filters -->
        <div class="act-filter">
          <button class="af-btn active" onclick="filterAct('all',this)">全部</button>
          <button class="af-btn" onclick="filterAct('研討會',this)">🎤 研討會</button>
          <button class="af-btn" onclick="filterAct('展覽',this)">🏛 展覽</button>
          <button class="af-btn" onclick="filterAct('會後問卷',this)">📝 會後問卷</button>
        </div>

        <!-- Result count -->
        <div class="result-count" id="resultCount"></div>

        <!-- Grid -->
        <div class="act-grid" id="actGrid">
          <div class="skeleton skel-card"></div>
          <div class="skeleton skel-card"></div>
          <div class="skeleton skel-card"></div>
          <div class="skeleton skel-card"></div>
          <div class="skeleton skel-card"></div>
          <div class="skeleton skel-card"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* THEME */
function toggleTheme(){
  document.body.classList.toggle('lm');
  const dark=!document.body.classList.contains('lm');
  document.getElementById('themeBtn').textContent=dark?'🌙 暗色':'☀️ 亮色';
  localStorage.setItem('sw_theme_v9',dark?'dark':'light');
}
(()=>{const t=localStorage.getItem('sw_theme_v9');if(t==='light'){document.body.classList.add('lm');document.getElementById('themeBtn').textContent='☀️ 亮色';}})();

/* DATA */
const ACT_KEY='sw_act_v9', ACT_TS='sw_act_ts9';
let allActs=[], actFilt='all';

const FALLBACK=[
  {title:'Markforged Day | 工業級3D列印實戰指南',date:'2026-04-16',tag:'研討會',url:'https://www.swtcim.com/Document/CourseDetail/63',img:'https://www.swtcim.com/Uploads/ActivtyPicture/63/639119554609571713.jpg'},
  {title:'Scanology 3D檢測應用工作坊',date:'2026-04-01',tag:'研討會',url:'https://www.swtcim.com/Document/CourseDetail/61',img:'https://www.swtcim.com/Uploads/ActivtyPicture/61/639106474930461371.jpg'},
  {title:'台北國際汽機車零配件展',date:'2026-03-27',tag:'展覽',url:'https://www.swtcim.com/Document/CourseDetail/60',img:'https://www.swtcim.com/Uploads/ActivtyPicture/60/639102155654715752.jpg'},
  {title:'工程設計的量產加速器：Formlabs 3D列印實務分享',date:'2026-03-11',tag:'研討會',url:'https://www.swtcim.com/Document/CourseDetail/58',img:'https://www.swtcim.com/Uploads/ActivtyPicture/58/639064208461906974.jpg'},
  {title:'Formlabs SLS 製程應用研討會',date:'2025-12-18',tag:'研討會',url:'https://www.swtcim.com/Document/CourseList',img:''},
  {title:'SOLIDWORKS 使用者大會',date:'2025-11-20',tag:'研討會',url:'https://www.swtcim.com/Document/CourseList',img:''},
  {title:'自動化技術展覽 2025',date:'2025-09-10',tag:'展覽',url:'https://www.swtcim.com/Document/CourseList',img:''},
  {title:'Formlabs Form 4 體驗課後問卷',date:'2025-08-05',tag:'會後問卷',url:'https://www.swtcim.com/Document/CourseList',img:''},
];

async function fetchActs(force=false){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('loading');document.getElementById('refreshIcon').textContent='⏳';
  if(!force){
    const ts=localStorage.getItem(ACT_TS);
    if(ts&&new Date(+ts).toDateString()===new Date().toDateString()){
      const c=localStorage.getItem(ACT_KEY);
      if(c){try{allActs=JSON.parse(c);renderActs();setLastUpdate(+ts);btn.classList.remove('loading');document.getElementById('refreshIcon').textContent='🔄';return;}catch(e){}}
    }
  }
  showSkel();
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:'請抓取 https://www.swtcim.com/Document/CourseList 取得最新10個活動。只回傳純 JSON，格式：{"items":[{"title":"活動標題","date":"YYYY-MM-DD","tag":"研討會","url":"https://...","img":"https://...jpg"}]}。tag 只能是「研討會」「展覽」「會後問卷」。只回傳 JSON，不要任何說明或 markdown。'}]
      })
    });
    const data=await resp.json();
    const text=data.content.filter(i=>i.type==='text').map(i=>i.text).join('');
    const m=text.match(/\{[\s\S]*"items"[\s\S]*\}/);
    if(!m)throw 0;
    const p=JSON.parse(m[0]);allActs=p.items||[];
    if(!allActs.length)throw 0;
    localStorage.setItem(ACT_KEY,JSON.stringify(allActs));localStorage.setItem(ACT_TS,Date.now().toString());
  }catch(e){
    allActs=FALLBACK;
    localStorage.setItem(ACT_KEY,JSON.stringify(allActs));localStorage.setItem(ACT_TS,Date.now().toString());
  }
  renderActs();setLastUpdate(Date.now());btn.classList.remove('loading');document.getElementById('refreshIcon').textContent='🔄';
}

function showSkel(){
  const g=document.getElementById('actGrid');g.innerHTML='';
  for(let i=0;i<6;i++){const d=document.createElement('div');d.className='skeleton skel-card';g.appendChild(d);}
}

function renderActs(){
  const g=document.getElementById('actGrid');g.innerHTML='';
  const list=actFilt==='all'?allActs:allActs.filter(x=>x.tag===actFilt);
  const shown=list.slice(0,10);
  document.getElementById('resultCount').innerHTML=shown.length?`顯示 <strong>${shown.length}</strong> 筆活動`:'';
  if(!shown.length){
    g.innerHTML=`<div class="empty-block"><div class="e-icon">📭</div><div class="e-txt">暫無符合條件的活動</div><div class="e-sub">請嘗試其他分類或點擊「立即更新」</div></div>`;
    return;
  }
  shown.forEach((item,idx)=>{
    const a=document.createElement('a');
    a.className='act-card';
    a.href=item.url||'https://www.swtcim.com/Document/CourseList';
    a.target='_blank';a.rel='noopener';
    const tc=item.tag==='展覽'?'expo':item.tag==='會後問卷'?'survey':'';
    const imgHtml=item.img
      ?`<img class="act-img" src="${item.img}" alt="${item.title}" onerror="this.parentNode.innerHTML='<div class=\\'act-ph\\'>🗓</div>'">`
      :`<div class="act-ph">🗓</div>`;
    a.innerHTML=`
      <div class="act-img-wrap">
        ${imgHtml}
        <div class="act-tag-wrap"><span class="act-tag ${tc}">${item.tag||'活動'}</span></div>
        <div class="act-num">${idx+1}</div>
      </div>
      <div class="act-body">
        <div class="act-title">${item.title}</div>
        <div class="act-date">📅 <span>${item.date}</span></div>
      </div>
      <div class="act-footer">
        <div class="act-cta">查看詳情 →</div>
      </div>`;
    g.appendChild(a);
  });
}

function filterAct(f,btn){
  actFilt=f;
  document.querySelectorAll('.af-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderActs();
}

function setLastUpdate(ts){
  const d=new Date(ts);
  document.getElementById('lastUpdateTxt').textContent=`最後更新：${d.toLocaleDateString('zh-TW')} ${d.toLocaleTimeString('zh-TW',{hour12:false,hour:'2-digit',minute:'2-digit'})}`;
}
function updateNextLbl(){
  const n=new Date(),nx=new Date();nx.setHours(8,0,0,0);
  if(n>=nx)nx.setDate(nx.getDate()+1);
  const diff=nx-n,h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  document.getElementById('nextRefreshTxt').textContent=`每日 08:00 自動更新（${h}h ${m}m 後）`;
}
function scheduleRefresh(){
  updateNextLbl();
  setInterval(()=>{
    const n=new Date();
    if(n.getHours()===8&&n.getMinutes()===0)fetchActs(true);
    updateNextLbl();
  },60000);
}

fetchActs(false);
scheduleRefresh();
</script>
</body>
</html>
